<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Glossary OG Image Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Serif Theme for Glossary */
        body {
            background-color: #fdfbf7;


        }

        header {
            background: #fff;

        }

        header a {
            color: #33028f;
        }

        /* nice serif font import if possible, but system fonts work */
    </style>
</head>

<body>
    <header>
        <h1>Glossary OG Image Generator</h1>
        <nav class="main-nav">
            <a href="index.html">Service Pages</a>
            <a href="tools.html">Tools</a>
            <a href="glossary.html" class="active">Glossary</a>
            <a href="blog-categories.html">Blog Categories</a>
        </nav>
    </header>

    <div class="main-content">
        <div class="controls-panel">
            <!-- TEXT INPUT -->
            <div class="control-group">
                <label for="textInput">Term:</label>
                <input id="textInput" type="text" placeholder="Watch Time Hours" />
            </div>

            <!-- FILENAME INPUT -->
            <div class="control-group">
                <label for="filenameInput">Image Name (optional):</label>
                <input id="filenameInput" type="text" placeholder="Enter image name..." />
            </div>

            <!-- BUTTONS -->
            <div class="control-group">
                <button id="downloadBtn">Download</button>
            </div>
        </div>

        <!-- CANVAS -->
        <canvas id="canvas" width="800" height="450"></canvas>
    </div>

    <p id="status"></p>

    <script src="shared.js"></script>
    <script src="glossary.js"></script>
</body>

</html>
